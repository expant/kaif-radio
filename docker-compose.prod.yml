services:
  frontend:
    image: ghcr.io/expant/kaif-radio-frontend:latest
    ports:
      - '80:80'
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    image: ghcr.io/expant/kaif-radio-backend:latest
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

# Именованный том: каталог станций переживает пересоздание контейнера.
volumes:
  redis-data:
