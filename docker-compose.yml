services:
  backend:
    build:
      context: ./backend
      target: dev
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./backend/src:/app/src
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    # Порт наружу — чтобы можно было заглянуть через redis-cli с хоста.
    ports:
      - '6379:6379'
