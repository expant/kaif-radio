services:
  backend:
    build: ./backend
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
    # Монтируем только исходники — hot-reload без пересборки образа.
    # node_modules остаётся из образа (его не перекрываем).
    volumes:
      - ./backend/src:/app/src
    depends_on:
      - redis

  # Персистентность каталога станций: backend поднимает прошлый каталог из
  # Redis мгновенно при старте, не дожидаясь сетевой выгрузки.
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
